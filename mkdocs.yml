site_name: Forge
site_description: Inference control plane for reasoning-aware open-source models
site_url: https://arkad171717.github.io/FORGE-Infer
repo_url: https://github.com/ArkaD171717/FORGE-Infer
repo_name: ArkaD171717/FORGE-Infer

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Layers:
      - Session (qwen-think): layers/session.md
      - MTP (qwen3.6-mtp): layers/mtp.md
      - Context (qwen3-repo): layers/context.md
      - Compat (qwen-compat): layers/compat.md
      - Observe (forge-observe): layers/observe.md
      - Cloud (forge-cloud): layers/cloud.md
  - Status & roadmap: roadmap.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
