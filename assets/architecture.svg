  <text x="368" y="416" text-anchor="middle" font-size="13" font-weight="500" fill="#b5d4f4">qwen3.6-mtp</text>
  <text x="368" y="436" text-anchor="middle" font-size="10" fill="#85b7eb">MTP speculative decoding</text>
</g>
<g>
  <rect x="470" y="392" width="184" height="56" rx="6"
