  </marker>
</defs>

<!-- Background -->
<rect width="720" height="720" rx="0" fill="#1a1a1a"/>

<!-- ================================================================ -->
<!-- LEFT LABELS                                                       -->
<!-- ================================================================ -->
<text x="38" y="62"  text-anchor="middle" font-size="11" font-weight="600" fill="#9c9a92">apps</text>
<text x="38" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#9c9a92">product</text>
<text x="38" y="252" text-anchor="middle" font-size="11" font-weight="600" fill="#9c9a92">observe</text>
<text x="38" y="338" text-anchor="middle" font-size="11" font-weight="600" fill="#9c9a92">engine</text>
<text x="38" y="430" text-anchor="middle" font-size="11" font-weight="600" fill="#9c9a92">core</text>
<text x="38" y="530" text-anchor="middle" font-size="11" font-weight="600" fill="#9c9a92">compat</text>
<text x="38" y="628" text-anchor="middle" font-size="11" font-weight="600" fill="#9c9a92">backends</text>

