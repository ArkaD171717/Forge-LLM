<svg width="100%" viewBox="0 0 720 720" role="img" xmlns="http://www.w3.org/2000/svg"
     font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
<title>Forge suite architecture diagram</title>

<defs>
